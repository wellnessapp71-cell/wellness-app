pluginManagement {
  def reactNativeGradlePlugin = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)
  
  def expoPluginsPath = new File(
    providers.exec {
      workingDir(rootDir)
      commandLine("node", "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })")
    }.standardOutput.asText.get().trim(),
    "../android/expo-gradle-plugin"
  ).absolutePath
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
}
expoAutolinking.useExpoModules()

def mobileNodeModulesDir = new File(rootDir.getParentFile(), "node_modules")
def workspaceNodeModulesDir = new File(rootDir.getParentFile().getParentFile().getParentFile(), "node_modules")

def resolveAutolinkSourceDir = { String sourceDir ->
  def configuredDir = file(sourceDir)
  if (configuredDir.exists()) {
    return configuredDir
  }

  def mobileNodeModulesPrefix = mobileNodeModulesDir.absolutePath + File.separator
  if (configuredDir.absolutePath.startsWith(mobileNodeModulesPrefix)) {
    def relativePath = configuredDir.absolutePath.substring(mobileNodeModulesPrefix.length())
    def workspaceCandidate = new File(workspaceNodeModulesDir, relativePath)
    if (workspaceCandidate.exists()) {
      return workspaceCandidate
    }
  }

  return configuredDir
}

def autolinkingConfigFile = new File(rootDir, "build/generated/autolinking/autolinking.json")
if (autolinkingConfigFile.exists()) {
  def autolinkingConfig = new groovy.json.JsonSlurper().parseText(autolinkingConfigFile.text)
  autolinkingConfig.dependencies.each { packageName, dependency ->
    def androidConfig = dependency?.platforms?.android
    def sourceDir = androidConfig?.sourceDir
    if (!sourceDir) {
      return
    }

    def projectName = packageName.startsWith('@') ? packageName.substring(1) : packageName
    projectName = projectName.replace('/', '_')
    def projectPath = ":${projectName}"
    def linkedProject = findProject(projectPath)
    if (linkedProject != null) {
      linkedProject.projectDir = resolveAutolinkSourceDir(sourceDir)
    }
  }
}

rootProject.name = 'Aura Wellness'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
